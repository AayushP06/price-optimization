databases:
  - name: priceopt-db
    databaseName: priceopt
    user: priceopt_user
    plan: free

services:
  - type: web
    name: price-optimizer-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn flask-api-backend:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: priceopt-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free